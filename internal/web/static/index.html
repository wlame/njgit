<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>njgit Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --card-hover: #1c2433;
            --card-active: #1a2744;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --hash: #d2a8ff;
            --file: #7ee787;
            --file-hover: #56d364;
            --header-bg: #010409;
            --scrollbar: #30363d;
            --scrollbar-hover: #484f58;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        header h1 span { color: var(--accent); }

        .search-box {
            flex: 1;
            max-width: 480px;
        }

        .search-box input {
            width: 100%;
            padding: 6px 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--text-secondary); }

        .stats {
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(360px, 1fr) 2fr;
            overflow: hidden;
        }

        .commits-panel {
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 8px;
        }

        .viewer-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .viewer-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 48px;
        }

        .viewer-header .file-path {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            font-size: 13px;
            color: var(--accent);
        }

        .viewer-header .commit-ref {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            font-size: 12px;
            color: var(--hash);
            background: rgba(210, 168, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .viewer-content {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        .viewer-content pre {
            margin: 0;
            padding: 16px 20px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.6;
            tab-size: 4;
            background: transparent !important;
        }

        .viewer-content pre code {
            background: none !important;
            padding: 0 !important;
        }

        .viewer-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .commit-card {
            padding: 12px 14px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.15s, border-color 0.15s;
        }

        .commit-card:hover { background: var(--card-hover); }

        .commit-card.active {
            background: var(--card-active);
            border-color: var(--accent);
        }

        .commit-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .commit-hash {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            font-size: 12px;
            color: var(--hash);
            background: rgba(210, 168, 255, 0.1);
            padding: 1px 6px;
            border-radius: 3px;
        }

        .commit-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .commit-author {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .commit-message {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .commit-files {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .file-tag {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
            font-size: 11px;
            color: var(--file);
            background: rgba(126, 231, 135, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
            border: none;
        }

        .file-tag:hover {
            background: rgba(126, 231, 135, 0.2);
            color: var(--file-hover);
        }

        .file-tag.active {
            background: rgba(126, 231, 135, 0.25);
            outline: 1px solid var(--file);
        }

        .loading, .error, .empty {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .loading { color: var(--text-secondary); }
        .error { color: #f85149; }
        .empty { color: var(--text-secondary); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
            .commits-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>njgit<span> dashboard</span></h1>
        <div class="search-box">
            <input type="text" id="search" placeholder="Filter commits by message, hash, or file...">
        </div>
        <div class="stats" id="stats"></div>
    </header>
    <main>
        <div class="commits-panel" id="commits-panel">
            <div class="loading">Loading commits...</div>
        </div>
        <div class="viewer-panel">
            <div class="viewer-header" id="viewer-header" style="display:none">
                <span class="file-path" id="viewer-path"></span>
                <span class="commit-ref" id="viewer-ref"></span>
            </div>
            <div class="viewer-content" id="viewer-content">
                <div class="viewer-placeholder">Select a file to view its contents</div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-hcl.min.js" crossorigin="anonymous"></script>
    <script>
        var allCommits = [];

        function el(tag, className, textContent) {
            var e = document.createElement(tag);
            if (className) e.className = className;
            if (textContent) e.textContent = textContent;
            return e;
        }

        function clearChildren(node) {
            while (node.firstChild) node.removeChild(node.firstChild);
        }

        function firstLine(msg) {
            return msg.split('\n')[0];
        }

        function shortPath(path) {
            var parts = path.split('/');
            return parts.length > 1 ? parts[parts.length - 1] : path;
        }

        function buildCommitCard(c) {
            var card = el('div', 'commit-card');
            card.dataset.hash = c.full_hash;

            var meta = el('div', 'commit-meta');
            meta.appendChild(el('span', 'commit-hash', c.hash));
            meta.appendChild(el('span', 'commit-date', c.date));
            meta.appendChild(el('span', 'commit-author', c.author));
            card.appendChild(meta);

            card.appendChild(el('div', 'commit-message', firstLine(c.message)));

            var filesDiv = el('div', 'commit-files');
            for (var i = 0; i < c.files.length; i++) {
                var btn = el('button', 'file-tag', shortPath(c.files[i]));
                btn.dataset.hash = c.full_hash;
                btn.dataset.path = c.files[i];
                filesDiv.appendChild(btn);
            }
            card.appendChild(filesDiv);

            return card;
        }

        async function loadCommits() {
            var panel = document.getElementById('commits-panel');
            try {
                var resp = await fetch('/api/commits?limit=500');
                if (!resp.ok) throw new Error(await resp.text());
                allCommits = await resp.json();
                renderCommits(allCommits);
            } catch (err) {
                clearChildren(panel);
                panel.appendChild(el('div', 'error', 'Failed to load commits: ' + err.message));
            }
        }

        function renderCommits(commits) {
            var panel = document.getElementById('commits-panel');
            var stats = document.getElementById('stats');

            clearChildren(panel);

            if (commits.length === 0) {
                panel.appendChild(el('div', 'empty', 'No commits found'));
                stats.textContent = '0 commits';
                return;
            }

            stats.textContent = commits.length + ' commit' + (commits.length !== 1 ? 's' : '');

            for (var i = 0; i < commits.length; i++) {
                panel.appendChild(buildCommitCard(commits[i]));
            }
        }

        async function loadFile(hash, path) {
            var content = document.getElementById('viewer-content');
            var header = document.getElementById('viewer-header');
            var pathEl = document.getElementById('viewer-path');
            var refEl = document.getElementById('viewer-ref');

            header.style.display = 'flex';
            pathEl.textContent = path;
            refEl.textContent = hash.substring(0, 8);

            clearChildren(content);
            content.appendChild(el('div', 'loading', 'Loading file...'));

            document.querySelectorAll('.file-tag.active').forEach(function(e) { e.classList.remove('active'); });
            document.querySelectorAll('.commit-card.active').forEach(function(e) { e.classList.remove('active'); });

            var clickedTag = document.querySelector('.file-tag[data-hash="' + hash + '"][data-path="' + CSS.escape(path) + '"]');
            if (clickedTag) {
                clickedTag.classList.add('active');
                var card = clickedTag.closest('.commit-card');
                if (card) card.classList.add('active');
            }

            try {
                var resp = await fetch('/api/file/' + encodeURIComponent(hash) + '/' + path.split('/').map(encodeURIComponent).join('/'));
                if (!resp.ok) throw new Error(await resp.text());
                var text = await resp.text();

                var pre = document.createElement('pre');
                var code = document.createElement('code');
                code.className = 'language-hcl';
                code.textContent = text;
                pre.appendChild(code);

                clearChildren(content);
                content.appendChild(pre);

                if (typeof Prism !== 'undefined') {
                    Prism.highlightElement(code);
                }
            } catch (err) {
                clearChildren(content);
                content.appendChild(el('div', 'error', 'Failed to load file: ' + err.message));
            }
        }

        // Event delegation
        document.getElementById('commits-panel').addEventListener('click', function(e) {
            var tag = e.target.closest('.file-tag');
            if (tag) {
                e.stopPropagation();
                loadFile(tag.dataset.hash, tag.dataset.path);
                return;
            }
            var card = e.target.closest('.commit-card');
            if (card) {
                var files = card.querySelectorAll('.file-tag');
                if (files.length === 1) {
                    loadFile(files[0].dataset.hash, files[0].dataset.path);
                }
            }
        });

        // Search filter with debounce
        var searchTimeout;
        document.getElementById('search').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
                var q = e.target.value.toLowerCase().trim();
                if (!q) {
                    renderCommits(allCommits);
                    return;
                }
                var filtered = allCommits.filter(function(c) {
                    return c.message.toLowerCase().indexOf(q) !== -1
                        || c.hash.toLowerCase().indexOf(q) !== -1
                        || c.author.toLowerCase().indexOf(q) !== -1
                        || c.files.some(function(f) { return f.toLowerCase().indexOf(q) !== -1; });
                });
                renderCommits(filtered);
            }, 150);
        });

        loadCommits();
    </script>
</body>
</html>
